<script>
// Shanghai sunrise/sunset (approximate)
const SUNRISE = 6, SUNSET = 18; // hours
let dayMode = null; // null = auto, true = day, false = night

const DAY_NIGHT_KEYFRAMES = [
  { time: 0,  bg: 0x070B1A, fog: 0x0A0E1F, ambient: 0x6080C0, sun: 0x4060A0, ambientI: 1.0, sunI: 1.0 },    // 深夜（明亮）
  { time: 6,  bg: 0x2A1A3A, fog: 0x3A2040, ambient: 0xC87840, sun: 0xFF9050, ambientI: 0.5, sunI: 0.9 },      // 日出
  { time: 8,  bg: 0x87CEEB, fog: 0xC8DFF0, ambient: 0xFFFFFF, sun: 0xFFFFF0, ambientI: 1.0, sunI: 1.8 },     // 上午
  { time: 12, bg: 0x5CB8E8, fog: 0xB0D4E8, ambient: 0xFFFFFF, sun: 0xFFE8B0, ambientI: 1.0, sunI: 2.0 },     // 正午
  { time: 17, bg: 0xD4845A, fog: 0xC89070, ambient: 0xC8A870, sun: 0xFF9050, ambientI: 0.7, sunI: 0.9 },     // 日落
  { time: 19, bg: 0x0F1228, fog: 0x141830, ambient: 0x1A2040, sun: 0x4060A0, ambientI: 1.0, sunI: 1.0 },       // 黄昏（调亮）
];

function lerpVal(a, b, t) { return a + (b - a) * t; }
function lerpColor(c1, c2, t) {
  const r1 = (c1 >> 16) & 0xff, g1 = (c1 >> 8) & 0xff, b1 = c1 & 0xff;
  const r2 = (c2 >> 16) & 0xff, g2 = (c2 >> 8) & 0xff, b2 = c2 & 0xff;
  return (Math.round(lerpVal(r1,r2,t)) << 16) | (Math.round(lerpVal(g1,g2,t)) << 8) | Math.round(lerpVal(b1,b2,t));
}

function getCurrentSky() {
  if (dayMode === true) return DAY_NIGHT_KEYFRAMES[2];
  if (dayMode === false) return DAY_NIGHT_KEYFRAMES[0];
  const now = new Date();
  const h = now.getHours() + now.getMinutes() / 60;
  let prev = DAY_NIGHT_KEYFRAMES[DAY_NIGHT_KEYFRAMES.length - 1];
  let next = DAY_NIGHT_KEYFRAMES[0];
  next = { ...next, time: next.time + 24 };
  for (let i = 1; i < DAY_NIGHT_KEYFRAMES.length; i++) {
    if (DAY_NIGHT_KEYFRAMES[i].time > h) {
      next = DAY_NIGHT_KEYFRAMES[i];
      prev = DAY_NIGHT_KEYFRAMES[i - 1];
      break;
    }
  }
  const span = next.time - prev.time;
  const t = span > 0 ? (h - prev.time) / span : 0;
  return {
    bg: lerpColor(prev.bg, next.bg, t),
    fog: lerpColor(prev.fog, next.fog, t),
    ambient: lerpColor(prev.ambient, next.ambient, t),
    sun: lerpColor(prev.sun, next.sun, t),
    ambientI: lerpVal(prev.ambientI, next.ambientI, t),
    sunI: lerpVal(prev.sunI, next.sunI, t),
  };
}

function applySky(sky) {
  const sc = window._scene;
  if (!sc || typeof window._ambientLight === 'undefined') return;
  sc.background.set(sky.bg);
  if (sc.fog.color) sc.fog.color.set(sky.fog);
  window._ambientLight.intensity = sky.ambientI;
  window._ambientLight.color.set(sky.ambient);
  window._sunLight.intensity = sky.sunI;
  window._sunLight.color.set(sky.sun);
  document.body.style.background = '#' + sky.bg.toString(16).padStart(6,'0');

  let sunAngle;
  if (dayMode === true) sunAngle = Math.PI / 2;
  else if (dayMode === false) sunAngle = -0.1;
  else {
    const now = new Date();
    const currentHour = now.getHours() + now.getMinutes() / 60;
    sunAngle = ((currentHour - 6) / 12) * Math.PI;
  }
  window._sunLight.position.set(
    Math.cos(sunAngle) * 15,
    Math.max(0.5, Math.sin(sunAngle) * 20),
    10
  );

  if (window._atmosphere && window._atmosphere.material.uniforms) {
    window._atmosphere.material.uniforms.glowColor.value.set(sky.sun);
  }
}

function setDayMode(mode) {
  dayMode = mode;
  applySky(getCurrentSky());
  const now = new Date();
  const h = now.getHours() + now.getMinutes() / 60;

  if (mode !== null) {
    document.getElementById('btn-auto').classList.toggle('active', false);
    document.getElementById('btn-day').classList.toggle('active', mode === true);
    document.getElementById('btn-night').classList.toggle('active', mode === false);
  } else {
    document.getElementById('btn-auto').classList.toggle('active', true);
    document.getElementById('btn-day').classList.toggle('active', h >= 6 && h < 19);
    document.getElementById('btn-night').classList.toggle('active', h < 6 || h >= 19);
  }
  applySky(getCurrentSky());
}

function updateClock() {
  if (dayMode !== null) return;
  const sky = getCurrentSky();
  applySky(sky);
}

setInterval(function(){
  updateClock();
  if (dayMode === null) applySky(getCurrentSky());
}, 1000);
updateClock();
</script>

<script type="module">
import * as THREE from '/three.module.js';
import { OrbitControls } from '/OrbitControls.js';
import { TransformControls } from '/TransformControls.js';
window._threeOk = true;

// ─── Scene ────────────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
window._scene = scene;
scene.background = new THREE.Color(0x060610);
scene.fog = new THREE.FogExp2(0x060610, 0.008);

const camera = new THREE.PerspectiveCamera(35, innerWidth / innerHeight, 0.1, 500);
camera.position.set(28, 22, 28);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: 'high-performance' });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.domElement.style.imageRendering = 'pixelated';
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ReinhardToneMapping;
renderer.toneMappingExposure = 1.5;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 10;
controls.maxDistance = 70;
controls.maxPolarAngle = Math.PI / 2.1;
controls.target.set(0, 1, 0);
controls.update();

// ─── TransformControls ─────────────────────────────────────────────────────────
const tc = new TransformControls(camera, renderer.domElement);
tc.setSize(0.8);
scene.add(tc);

let editMode = false;
let selectedObject = null;
// raycaster 和 mouse 复用底部已声明的版本
const editBtn = document.getElementById('edit-mode-btn');
const panel = document.getElementById('transform-panel');
const nameEl = document.getElementById('selected-model-name');
const inputX = document.getElementById('input-x');
const inputY = document.getElementById('input-y');
const inputZ = document.getElementById('input-z');

// 可选中的模型列表
const selectable = [];

function rebuildSelectable() {
  selectable.length = 0;
  // device groups
  [macbookGroup, ubuntuGroup].forEach(g => {
    if (g) selectable.push(g);
  });
  // NPC groups
  npcs.forEach(npc => selectable.push(npc));
  // LED wall
  if (typeof ledScreen !== 'undefined') selectable.push(ledScreen);
  // street lights poles
  if (window._cityLight1) selectable.push(window._cityLight1);
  if (window._cityLight2) selectable.push(window._cityLight2);
  if (window._pole1) selectable.push(window._pole1);
  if (window._pole2) selectable.push(window._pole2);
  // street light groups
  if (window.streetLightGroups) window.streetLightGroups.forEach(g => selectable.push(g));
  // trees
  if (window.treeGroups) window.treeGroups.forEach(g => selectable.push(g));
}

function setSelected(obj) {
  if (selectedObject) tc.detach();
  selectedObject = obj;
  if (!obj) {
    nameEl.textContent = '未选中';
    inputX.value = '';
    inputY.value = '';
    inputZ.value = '';
    return;
  }
  tc.attach(obj);
  const name = obj.userData?.id || obj.userData?.name || obj.name || '未知';
  nameEl.textContent = name;
  inputX.value = obj.position.x.toFixed(3);
  inputY.value = obj.position.y.toFixed(3);
  inputZ.value = obj.position.z.toFixed(3);
}

function syncXYZFromObject() {
  if (!selectedObject) return;
  inputX.value = selectedObject.position.x.toFixed(3);
  inputY.value = selectedObject.position.y.toFixed(3);
  inputZ.value = selectedObject.position.z.toFixed(3);
}

function toggleEditMode() {
  editMode = !editMode;
  editBtn.classList.toggle('active', editMode);
  panel.classList.toggle('active', editMode);
  if (!editMode) {
    tc.detach();
    selectedObject = null;
    nameEl.textContent = '未选中';
    inputX.value = '';
    inputY.value = '';
    inputZ.value = '';
    controls.enabled = true;
  } else {
    controls.enabled = false;
    rebuildSelectable();
  }
}

editBtn.addEventListener('click', toggleEditMode);

// 退出按钮
document.getElementById('exit-btn').addEventListener('click', () => {
  if (editMode) toggleEditMode();
});

// 保存按钮：收集所有模型当前世界坐标，POST 到服务器保存到 world.html
document.getElementById('save-btn').addEventListener('click', () => {
  // 同步最终坐标
  if (selectedObject) {
    inputX.value = selectedObject.position.x.toFixed(3);
    inputY.value = selectedObject.position.y.toFixed(3);
    inputZ.value = selectedObject.position.z.toFixed(3);
  }

  // 收集所有 selectable 对象的位置
  // nameMap: world.html 源码变量名 → Three.js Group 对象
  // nameMap: 变量名 → 对象（用于保存坐标到源码）
  const nameMap = { macbookGroup, ubuntuGroup, _pole1: window._pole1, _pole2: window._pole2 };
  if (window.streetLightGroups) window.streetLightGroups.forEach((g, i) => { nameMap["streetLight" + i] = g; });
  if (window.treeGroups) window.treeGroups.forEach((g, i) => { nameMap["tree" + i] = g; });
  const posData = {};
  selectable.forEach(obj => {
    const varName = Object.entries(nameMap).find(([, v]) => v === obj)?.[0] ||
                    obj.userData?.id || obj.name || null;
    if (!varName) return;
    posData[varName] = {
      x: parseFloat(obj.position.x.toFixed(3)),
      y: parseFloat(obj.position.y.toFixed(3)),
      z: parseFloat(obj.position.z.toFixed(3))
    };
  });

  // POST 到本地 save 端点
  fetch('http://127.0.0.1:18999/save', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ positions: posData, timestamp: new Date().toISOString() })
  }).then(r => r.ok ? showSaveMsg('✅ 已保存到 world.html（坐标已写入源码）', true) : showSaveMsg('❌ 保存失败', false))
    .catch(() => {
      // 服务器不支持则下载坐标文本，手动替换
      const lines = Object.entries(posData).map(([id, p]) =>
        id + ': x=' + p.x + '  y=' + p.y + '  z=' + p.z
      ).join('\n');
      const blob = new Blob(['// 世界坐标快照 ' + new Date().toLocaleString('zh-CN') + '\n' + lines], { type: 'text/plain' });
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
      a.download = 'world-positions-' + Date.now() + '.txt'; a.click();
      showSaveMsg('⚠️ 服务器不支持保存，已下载坐标文件\n请手动替换 world.html 对应位置', false);
    });
});

function showSaveMsg(text, ok) {
  const m = document.createElement('div');
  m.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,10,20,0.97);border:2px solid ' + (ok ? '#44ff88' : '#ffaa44') + ';color:' + (ok ? '#44ff88' : '#ffaa44') + ';padding:20px 32px;border-radius:8px;font-family:Courier New,monospace;font-size:13px;z-index:99999;line-height:1.8;text-align:center;';
  m.innerHTML = text.replace(/\n/g, '<br>');
  document.body.appendChild(m);
  setTimeout(() => m.remove(), 4000);
};

// XYZ 输入 → 实时更新对象坐标
function onXYZInput() {
  if (!selectedObject) return;
  const x = parseFloat(inputX.value);

renderer.domElement.addEventListener('pointerdown', e => {
  if (!editMode) return;
  if (e.button !== 0) return;
  // 忽略面板上的点击
  if (e.target !== renderer.domElement) return;

  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(selectable, true);
  if (hits.length > 0) {
    // 找到最近的选中对象（可能是子物体，向上找 group）
    let obj = hits[0].object;
    while (obj && !selectable.includes(obj) && obj.parent) obj = obj.parent;
    if (obj && selectable.includes(obj)) setSelected(obj);
  }
});

}

function drawTaskQueue(ctx, data) {
  if (!data || !data.tasks) return;

  // 像素网格背景
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, 1920, 1080);
  ctx.fillStyle = '#111128';
  for (let x = 0; x < 1920; x += 8) {
    for (let y = 0; y < 1080; y += 8) {
      ctx.fillRect(x, y, 6, 6);
    }
  }

  // 标题
  ctx.font = 'bold 48px monospace';
  ctx.fillStyle = '#00ddff';
  ctx.textAlign = 'center';
  ctx.fillText('0-1 项目看板', 960, 70);

  // 分隔线
  ctx.strokeStyle = '#334466';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(60, 100); ctx.lineTo(1860, 100); ctx.stroke();

  // 统计栏
  const tasks = data.tasks;
  const total = tasks.length;
  const completed = tasks.filter(t => t.status === 'completed').length;
  const notStarted = tasks.filter(t => t.status === 'not-started').length;
  const inProgress = tasks.filter(t => ['in-progress', 'running'].includes(t.status)).length;
  const planning = tasks.filter(t => t.status === 'planning').length;
  const failed = tasks.filter(t => t.status === 'failed').length;
  const auto = tasks.filter(t => t.mode === 'auto').length;
  const interactive = tasks.filter(t => t.mode === 'interactive').length;

  const stats = [
    { label: '总任务', val: total, color: '#ffffff' },
    { label: '✅完成', val: completed, color: '#44ff44' },
    { label: '🔄进行', val: inProgress, color: '#ffaa00' },
    { label: '📋待办', val: notStarted, color: '#ff4444' },
    { label: '✏️规划', val: planning, color: '#4488ff' },
    { label: '🤖自动', val: auto, color: '#00cec9' },
    { label: '👤互动', val: interactive, color: '#a29bfe' },
  ];
  ctx.font = 'bold 22px monospace';
  ctx.textAlign = 'left';
  let sx = 60;
  stats.forEach(s => {
    ctx.fillStyle = s.color;
    ctx.fillText(s.label + ' ' + s.val, sx, 140);
    sx += 240;
  });

  ctx.strokeStyle = '#334466';
  ctx.beginPath();
  ctx.moveTo(60, 158); ctx.lineTo(1860, 158); ctx.stroke();

  // 按优先级分组渲染
  const PRIORITY_ORDER = ['P0', 'P1', 'P2', 'P3'];
  const PRIORITY_COLORS = { P0: '#ff4757', P1: '#ffa502', P2: '#2ed573', P3: '#70a1ff' };
  const STATUS_COLORS = {
    'completed': '#44ff44',
    'completed-with-issues': '#ffaa00',
    'in-progress': '#ffaa00',
    'running': '#ffaa00',
    'not-started': '#555566',
    'planning': '#4488ff',
    'failed': '#ff4444',
  };

  const groups = {};
  PRIORITY_ORDER.forEach(p => { groups[p] = []; });
  tasks.forEach(t => {
    const p = t.priority || 'P3';
    if (!groups[p]) groups[p] = [];
    groups[p].push(t);
  });

  let y = 188;
  PRIORITY_ORDER.forEach(p => {
    const pts = groups[p];
    if (!pts || pts.length === 0) return;
    if (y > 960) return;

    // 优先级标题
    ctx.font = 'bold 24px monospace';
    ctx.fillStyle = PRIORITY_COLORS[p];
    ctx.textAlign = 'left';
    ctx.fillText(p + '  ' + pts.length + '个任务', 60, y);

    // 模式标签
    const autoCnt = pts.filter(t => t.mode === 'auto').length;
    const intCnt = pts.filter(t => t.mode === 'interactive').length;
    ctx.font = '20px monospace';
    ctx.fillStyle = '#00cec9';
    ctx.fillText('🤖' + autoCnt, 240, y);
    ctx.fillStyle = '#a29bfe';
    ctx.fillText('👤' + intCnt, 330, y);

    // 状态计数
    const done = pts.filter(t => ['completed', 'completed-with-issues'].includes(t.status)).length;
    ctx.fillStyle = '#556677';
    ctx.fillText('已完成 ' + done + '/' + pts.length, 430, y);

    y += 38;

    // 每个任务一行
    pts.forEach(t => {
      if (y > 960) return;
      const sColor = STATUS_COLORS[t.status] || '#555566';
      ctx.fillStyle = '#334455';
      ctx.font = '22px monospace';
      ctx.textAlign = 'left';
      ctx.fillText(t.id || '', 60, y);
      ctx.fillStyle = '#c8d8f0';
      ctx.font = '22px monospace';
      ctx.fillText((t.name || '').substring(0, 36), 130, y);
      // 状态色块
      const statusText = t.status === 'completed-with-issues' ? '⚠完成' :
                         t.status === 'completed' ? '✅完成' :
                         t.status === 'not-started' ? '⏳待办' :
                         t.status === 'in-progress' ? '🔄进行' :
                         t.status === 'planning' ? '✏️规划' :
                         t.status === 'failed' ? '❌失败' : t.status || '';
      ctx.fillStyle = sColor;
      ctx.font = 'bold 20px monospace';
      ctx.textAlign = 'right';
      ctx.fillText(statusText, 1860, y);
      ctx.textAlign = 'left';
      y += 36;
    });
    y += 10;
  });

  // 整体进度条
  const ratio = total > 0 ? completed / total : 0;
  ctx.fillStyle = '#1a1a2a';
  ctx.fillRect(60, 996, 1800, 16);
  ctx.fillStyle = '#00ddff';
  ctx.fillRect(60, 996, 1800 * ratio, 16);
  ctx.font = 'bold 18px monospace';
  ctx.fillStyle = '#00ddff';
  ctx.textAlign = 'left';
  ctx.fillText('整体进度 ' + completed + '/' + total + '  (' + Math.round(ratio * 100) + '%)', 60, 1038);

  // 时间戳
  ctx.fillStyle = '#334455';
  ctx.font = '18px monospace';
  ctx.textAlign = 'right';
  ctx.fillText(new Date().toLocaleString('zh-CN'), 1860, 1038);
}

  ctx.stroke();

  if (data && data.tasks) {
    let y = 160;

      let color = '#666666';

      else if (task.status === 'in-progress') color = '#ffaa00';
      else if (task.status === 'not-started') color = '#ff4444';
      else if (task.status === 'planning') color = '#4488ff';

      ctx.fillStyle = color;
      ctx.font = 'bold 26px monospace';
      ctx.textAlign = 'left';
      const idStr = task.id || '';
      const titleStr = task.title || task.name || '';
      ctx.fillText(idStr + ' ' + titleStr, 80, y);

      ctx.fillStyle = '#778899';
      ctx.font = '20px monospace';
      ctx.textAlign = 'right';
      const statusStr = task.status || '';
      ctx.fillText(statusStr, 1840, y);

      // 进度条背景
      ctx.fillStyle = '#1a1a2a';
      ctx.fillRect(80, y + 6, 1680, 8);
      // 进度条
      let prog = 0;
      if (task.status === 'completed') prog = 1;
      else if (task.status === 'in-progress') prog = 0.5;
      else if (task.status === 'planning') prog = 0.2;
      ctx.fillStyle = color;
      ctx.fillRect(80, y + 6, 1680 * prog, 8);

      y += 60;
      if (y > 980) return;
    });
  }

  // 时间戳
  ctx.fillStyle = '#334455';
  ctx.font = '20px monospace';
  ctx.textAlign = 'right';
  ctx.fillText(new Date().toLocaleString(), 1800, 1060);

  // 整体进度条（y=1000）
  const total = data.tasks.length;

  const ratio = total > 0 ? successCount / total : 0;

  ctx.fillStyle = '#44ff44';
  ctx.fillRect(80, 1000, 1760 * ratio, 20);
  ctx.fillStyle = '#00ddff';
  ctx.font = 'bold 20px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(`进度 ${successCount}/${total}`, 80, 998);
  ctx.textAlign = 'right';
  ctx.fillText(new Date().toLocaleString(), 1800, 1060);
}

// ─── NPC 状态气泡 ─────────────────────────────────────────────────────────────
function makeStatusSprite(text, color) {
  const c = document.createElement('canvas');
  c.width = 320; c.height = 72;
  const ctx = c.getContext('2d');
  // 气泡背景
  ctx.fillStyle = 'rgba(10,12,20,0.9)';
  const bw = 310, bh = 62, bx = 5, by = 5, br = 8;
  ctx.beginPath();
  ctx.moveTo(bx+br,by);
  ctx.lineTo(bx+bw-br,by);
  ctx.quadraticCurveTo(bx+bw,by,bx+bw,by+br);
  ctx.lineTo(bx+bw,by+bh-br);
  ctx.quadraticCurveTo(bx+bw,by+bh,bx+bw-br,by+bh);
  ctx.lineTo(bx+br,by+bh);
  ctx.quadraticCurveTo(bx,by+bh,bx,by+bh-br);
  ctx.lineTo(bx,by+br);
  ctx.quadraticCurveTo(bx,by,bx+br,by);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.stroke();
  // 文字
  ctx.font = 'bold 24px Courier New';
  ctx.fillStyle = color;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, 160, 36);
  const tex = new THREE.CanvasTexture(c);
  const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true }));
  sprite.scale.set(2.8, 0.65, 1);
  return sprite;
}

function updateNPCStatus(npc) {
  const pos = npc.position;
  const macDist = Math.sqrt(pos.x * pos.x + pos.z * pos.z);
  const ubuntuPos = ubuntuGroup.position;
  const ubuntuDist = Math.sqrt((pos.x - ubuntuPos.x) ** 2 + (pos.z - ubuntuPos.z) ** 2);
  let text, color;
  if (macDist < 8) {
    text = '编码中...'; color = '#44ff88';
  } else if (ubuntuDist < 8) {
    text = '待接入'; color = '#ffaa44';
  } else {
    text = '巡检中'; color = '#44aaff';
  }
  if (!npc.userData.statusSprite) {
    npc.userData.statusSprite = makeStatusSprite(text, color);
    npc.userData.statusSprite.position.y = 2.1;
    npc.add(npc.userData.statusSprite);
    npc.userData._lastStatus = text;
  } else {
    if (npc.userData._lastStatus !== text) {
      npc.remove(npc.userData.statusSprite);
      npc.userData.statusSprite = makeStatusSprite(text, color);
      npc.userData.statusSprite.position.y = 2.1;
      npc.add(npc.userData.statusSprite);
      npc.userData._lastStatus = text;
    }
  }
}

// ─── 树 ────────────────────────────────────────────────────────────────────────
function moveNPCToWork(npc) {
  if (!npc.userData.workTarget) return;
  const t = npc.userData.workTarget;
  const dx = t.x - npc.position.x;
  const dz = t.z - npc.position.z;
  const dist = Math.sqrt(dx*dx + dz*dz);
  if (dist > 0.1) {
    npc.position.x += dx * 0.02;
    npc.position.z += dz * 0.02;
    // 面向移动方向
    npc.rotation.y = Math.atan2(dx, dz);
  } else {
    // 面向设备方向
    npc.rotation.y = Math.atan2(dx, dz);
  }
}

// ─── 大气层 ───────────────────────────────────────────────────────────────────
const atmosphereVS = `
varying vec3 vNormal;
void main() { vNormal = normalize(normalMatrix * normal); gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }
`;
const atmosphereFS = `
varying vec3 vNormal;
uniform vec3 glowColor;
void main() {
  float intensity = pow(0.65 - dot(vNormal, vec3(0.0,0.0,1.0)), 2.5);
  gl_FragColor = vec4(glowColor, intensity * 0.4);
}
`;
const atmosphereMat = new THREE.ShaderMaterial({
  vertexShader: atmosphereVS,
  fragmentShader: atmosphereFS,
  uniforms: { glowColor: { value: new THREE.Color(0x3399ff) } },
  transparent: true, side: THREE.BackSide, depthWrite: false
});
window._atmosphere = new THREE.Mesh(new THREE.SphereGeometry(80,32,32), atmosphereMat);

// ─── 点击交互 ─────────────────────────────────────────────────────────────────
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const clickables = [macbookGroup, ubuntuGroup];

renderer.domElement.addEventListener('click', (e) => {
  if (editMode) return; // 编辑模式下不响应 URL 点击
  mouse.x = (e.clientX / innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(clickables, true);
  if (hits.length) {
    let obj = hits[0].object;
    while (obj.parent && !obj.userData.url) obj = obj.parent;
    if (obj.userData.url) window.open(obj.userData.url, '_blank');
  }
});

// ─── 动画循环 ─────────────────────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  const time = Date.now() * 0.001;

  updateCameraFlyIn();
  applySky(getCurrentSky());

  // 深夜路灯强制提亮（覆盖 keyframe，绕过解析问题）
  const h = new Date().getHours() + new Date().getMinutes() / 60;
  if (starField) starField.visible = (h < 6 || h >= 19);
  if (moonMesh) moonMesh.visible = (h < 6 || h >= 19);
  if (h < 6 || h >= 19) {
    if (window._ambientLight) {
      window._ambientLight.intensity = 2.0;
      window._ambientLight.color.set(0x6080c0);
    }
    if (window._sunLight) {
      window._sunLight.intensity = 2.0;
      window._sunLight.color.set(0x4060a0);
    }
    // 城市区域两盏高路灯
    if (window._cityLight1) { window._cityLight1.intensity = 15.0; }
    if (window._cityLight2) { window._cityLight2.intensity = 15.0; }
    // 每根灯柱的 PointLight（在 scene.children 里找）
    scene.children.forEach(c => {
      if (c.isPointLight && c.color && c.color.r > 0.9 && c.color.g > 0.9) {
        c.intensity = 10.0;
      }
    });
  }

  // LED 幕墙更新（每 5 秒）
  if (time - (window._lastLEDUpdate || 0) > 5) {
    window._lastLEDUpdate = time;
    updateLEDScreen();
  }

  // NPC idle 动画 + 状态更新
  npcs.forEach(npc => {
    const body = npc.userData.body;
    const head = npc.userData.head;
    const armL = npc.userData.armL;
    const armR = npc.userData.armR;
    if (body) body.position.y = (npc.userData.baseBodyY || 0) + Math.sin(time * 2 + npc.id * 10) * 0.03;
    if (head) head.rotation.y = Math.sin(time * 1.5 + npc.id * 5) * 0.1;
    // 打字手臂动画：当距离 workTarget < 0.5 且 workType=coding 时
    const wt = npc.userData.workTarget;
    const dist = wt ? Math.hypot(npc.position.x - wt.x, npc.position.z - wt.z) : 999;
    const isCoding = npc.userData.workType === 'coding' && dist < 0.5;
    if (armL) armL.rotation.x = isCoding ? Math.sin(time * 8 + npc.id * 3) * 0.4 : 0;
    if (armR) armR.rotation.x = isCoding ? Math.sin(time * 8 + npc.id * 3 + Math.PI) * 0.4 : 0;
    // 行走腿部动画：dist > 0.1 时左右腿 position.z 交替前后摆动
    const legL = npc.userData.legL;
    const legR = npc.userData.legR;
    if (dist > 0.1) {
      if (legL) legL.position.z = Math.sin(time * 10 + npc.id * 7) * 0.15;
      if (legR) legR.position.z = Math.sin(time * 10 + npc.id * 7 + Math.PI) * 0.15;
    } else {
      if (legL) legL.position.z = 0;
      if (legR) legR.position.z = 0;
    }
    moveNPCToWork(npc);
    updateNPCStatus(npc);
  });

  // MacBook 状态指示器脉冲
  if (window._macPulse) {
    const s = 1 + Math.sin(time * 3) * 0.3;
    window._macPulse.scale.set(s, s, s);
    window._macPulse.material.opacity = 0.3 - Math.sin(time * 3) * 0.2;
  }

  clouds.forEach((c,i) => { c.position.x += 0.005 * (i%2===0 ? 1 : -1); if (Math.abs(c.position.x) > 30) c.position.x *= -1; });
  controls.update();
  renderer.render(scene, camera);
}
animate();

  camera.aspect = innerWidth / innerHeight;
