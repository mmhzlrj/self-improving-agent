<script>
// Shanghai sunrise/sunset (approximate)
const SUNRISE = 6, SUNSET = 18; // hours
let dayMode = null; // null = auto, true = day, false = night

const DAY_NIGHT_KEYFRAMES = [
  { time: 0,  bg: 0x070B1A, fog: 0x0A0E1F, ambient: 0x182040, sun: 0x182038, ambientI: 0.15, sunI: 0.05 },    // 深夜
  { time: 6,  bg: 0x2A1A3A, fog: 0x3A2040, ambient: 0xC87840, sun: 0xFF9050, ambientI: 0.5, sunI: 0.9 },      // 日出
  { time: 8,  bg: 0x87CEEB, fog: 0xC8DFF0, ambient: 0xFFFFFF, sun: 0xFFFFF0, ambientI: 1.0, sunI: 1.8 },     // 上午
  { time: 12, bg: 0x5CB8E8, fog: 0xB0D4E8, ambient: 0xFFFFFF, sun: 0xFFE8B0, ambientI: 1.0, sunI: 2.0 },     // 正午
  { time: 17, bg: 0xD4845A, fog: 0xC89070, ambient: 0xC8A870, sun: 0xFF9050, ambientI: 0.7, sunI: 0.9 },     // 日落
  { time: 19, bg: 0x0F1228, fog: 0x141830, ambient: 0x1A2040, sun: 0x2040A0, ambientI: 0.25, sunI: 0.2 },    // 黄昏
];

function lerpVal(a, b, t) { return a + (b - a) * t; }
function lerpColor(c1, c2, t) {
  const r1 = (c1 >> 16) & 0xff, g1 = (c1 >> 8) & 0xff, b1 = c1 & 0xff;
  const r2 = (c2 >> 16) & 0xff, g2 = (c2 >> 8) & 0xff, b2 = c2 & 0xff;
  return (Math.round(lerpVal(r1,r2,t)) << 16) | (Math.round(lerpVal(g1,g2,t)) << 8) | Math.round(lerpVal(b1,b2,t));
}

function getCurrentSky() {
  if (dayMode === true) return DAY_NIGHT_KEYFRAMES[2];
  if (dayMode === false) return DAY_NIGHT_KEYFRAMES[0];
  const now = new Date();
  const h = now.getHours() + now.getMinutes() / 60;
  let prev = DAY_NIGHT_KEYFRAMES[DAY_NIGHT_KEYFRAMES.length - 1];
  let next = DAY_NIGHT_KEYFRAMES[0];
  next = { ...next, time: next.time + 24 };
  for (let i = 1; i < DAY_NIGHT_KEYFRAMES.length; i++) {
    if (DAY_NIGHT_KEYFRAMES[i].time > h) {
      next = DAY_NIGHT_KEYFRAMES[i];
      prev = DAY_NIGHT_KEYFRAMES[i - 1];
      break;
    }
  }
  const span = next.time - prev.time;
  const t = span > 0 ? (h - prev.time) / span : 0;
  return {
    bg: lerpColor(prev.bg, next.bg, t),
    fog: lerpColor(prev.fog, next.fog, t),
    ambient: lerpColor(prev.ambient, next.ambient, t),
    sun: lerpColor(prev.sun, next.sun, t),
    ambientI: lerpVal(prev.ambientI, next.ambientI, t),
    sunI: lerpVal(prev.sunI, next.sunI, t),
  };
}

function applySky(sky) {
  const sc = window._scene;
  if (!sc || typeof window._ambientLight === 'undefined') return;
  sc.background.set(sky.bg);
  if (sc.fog.color) sc.fog.color.set(sky.fog);
  window._ambientLight.intensity = sky.ambientI;
  window._ambientLight.color.set(sky.ambient);
  window._sunLight.intensity = sky.sunI;
  window._sunLight.color.set(sky.sun);
  document.body.style.background = '#' + sky.bg.toString(16).padStart(6,'0');

  let sunAngle;
  if (dayMode === true) sunAngle = Math.PI / 2;
  else if (dayMode === false) sunAngle = -0.1;
  else {
    const now = new Date();
    const currentHour = now.getHours() + now.getMinutes() / 60;
    sunAngle = ((currentHour - 6) / 12) * Math.PI;
  }
  window._sunLight.position.set(
    Math.cos(sunAngle) * 15,
    Math.max(0.5, Math.sin(sunAngle) * 20),
    10
  );

  if (window._atmosphere && window._atmosphere.material.uniforms) {
    window._atmosphere.material.uniforms.glowColor.value.set(sky.sun);
  }
}

function setDayMode(mode) {
  dayMode = mode;
  applySky(getCurrentSky());
  const now = new Date();
  const h = now.getHours() + now.getMinutes() / 60;

  if (mode !== null) {
    document.getElementById('btn-auto').classList.toggle('active', false);
    document.getElementById('btn-day').classList.toggle('active', mode === true);
    document.getElementById('btn-night').classList.toggle('active', mode === false);
  } else {
    document.getElementById('btn-auto').classList.toggle('active', true);
    document.getElementById('btn-day').classList.toggle('active', h >= 6 && h < 19);
    document.getElementById('btn-night').classList.toggle('active', h < 6 || h >= 19);
  }
  applySky(getCurrentSky());
}

function updateClock() {
  if (dayMode !== null) return;
  const sky = getCurrentSky();
  applySky(sky);
}

setInterval(function(){
  updateClock();
  if (dayMode === null) applySky(getCurrentSky());
}, 1000);
updateClock();
</script>

<script type="module">
import * as THREE from './three.module.js';
import { OrbitControls } from './OrbitControls.js';
window._threeOk = true;

// ─── Scene ────────────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
window._scene = scene;
scene.background = new THREE.Color(0x060610);
scene.fog = new THREE.FogExp2(0x060610, 0.008);

const camera = new THREE.PerspectiveCamera(35, innerWidth / innerHeight, 0.1, 500);
camera.position.set(28, 22, 28);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: 'high-performance' });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.domElement.style.imageRendering = 'pixelated';
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ReinhardToneMapping;
renderer.toneMappingExposure = 1.5;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 10;
controls.maxDistance = 70;
controls.maxPolarAngle = Math.PI / 2.1;
controls.target.set(0, 1, 0);
controls.update();

camera.position.set(0, 25, 35);
const flyTarget = { x: 0, y: 8, z: 18 };
let flyProgress = 0;

function updateCameraFlyIn() {
  if (flyProgress >= 1) return;
  flyProgress += 0.008;
  if (flyProgress > 1) flyProgress = 1;
  const t = flyProgress * flyProgress * (3 - 2 * flyProgress);
  camera.position.x = THREE.MathUtils.lerp(camera.position.x, flyTarget.x, t * 0.05);
  camera.position.y = THREE.MathUtils.lerp(25, flyTarget.y, t);
  camera.position.z = THREE.MathUtils.lerp(35, flyTarget.z, t);
}

window._ambientLight = new THREE.AmbientLight(0x223355, 0.7); scene.add(window._ambientLight);
window._sunLight = new THREE.DirectionalLight(0x8899cc, 0.8);
window._sunLight.position.set(15, 30, 10);
window._sunLight.castShadow = true;
window._sunLight.shadow.mapSize.width = 1024;
window._sunLight.shadow.mapSize.height = 1024;
window._sunLight.shadow.camera.near = 0.5;
window._sunLight.shadow.camera.far = 100;
window._sunLight.shadow.camera.left = -30;
window._sunLight.shadow.camera.right = 30;
window._sunLight.shadow.camera.top = 30;
window._sunLight.shadow.camera.bottom = -30;
window._sunLight.shadow.bias = -0.001;
scene.add(window._sunLight);
const pLight = new THREE.PointLight(0x334466, 0.5, 60); pLight.position.set(-10, 10, -10); scene.add(pLight);

// ─── Ground ───────────────────────────────────────────────────────────────────
function buildGround() {
  // 底层地面
  const ground = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshStandardMaterial({ color: 0x0a140a, roughness: 0.7, metalness: 0.05 }));
  ground.rotation.set(-Math.PI / 2, 0, 0);
  ground.receiveShadow = true;
  scene.add(ground);

  // 原 GridHelper（保留）
  const grid = new THREE.GridHelper(200, 50, 0x1a3a1a, 0x112211);
  grid.position.y = 0.01;
  scene.add(grid);

  // 地砖（恢复暗色，贴地面）
  const deskFloor = new THREE.Mesh(new THREE.PlaneGeometry(30, 30), new THREE.MeshStandardMaterial({ color: 0x2a2520, roughness: 0.9, metalness: 0.02 }));
  deskFloor.rotation.x = -Math.PI / 2;
  deskFloor.position.y = 0.005;
  deskFloor.receiveShadow = true;
  scene.add(deskFloor);

  // 网格线（恢复 y=0.01）
  for (let i = 0; i < 10; i++) {
    const t = (i / 10) * 30 - 15;
    const lineH = new THREE.Mesh(new THREE.PlaneGeometry(30, 0.03), new THREE.MeshBasicMaterial({ color: 0x2a2520, transparent: true, opacity: 0.18 }));
    lineH.rotation.x = -Math.PI / 2;
    lineH.position.set(0, 0.01, t);
    scene.add(lineH);
    const lineV = new THREE.Mesh(new THREE.PlaneGeometry(0.03, 30), new THREE.MeshBasicMaterial({ color: 0x2a2520, transparent: true, opacity: 0.18 }));
    lineV.rotation.x = -Math.PI / 2;
    lineV.position.set(t, 0.01, 0);
    scene.add(lineV);
  }
}

// ─── Stars ───────────────────────────────────────────────────────────────────
function buildStars() {
  const n = 2000, pos = new Float32Array(n*3), col = new Float32Array(n*3);
  for (let i = 0; i < n; i++) {
    const th = Math.random()*Math.PI*2, ph = Math.acos(2*Math.random()-1), r = 150+Math.random()*100;
    pos[i*3]   = r*Math.sin(ph)*Math.cos(th);
    pos[i*3+1] = Math.abs(r*Math.cos(ph))+10;
    pos[i*3+2] = r*Math.sin(ph)*Math.sin(th);
    const b = 0.3+Math.random()*0.7;
    col[i*3]=b*(0.8+Math.random()*0.2); col[i*3+1]=b*(0.8+Math.random()*0.2); col[i*3+2]=b;
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(pos,3));
  g.setAttribute('color', new THREE.BufferAttribute(col,3));
  scene.add(new THREE.Points(g, new THREE.PointsMaterial({ size:0.5, vertexColors:true })));
}

function pxMat(c) { return new THREE.MeshStandardMaterial({ color: c, roughness: 0.45, metalness: 0.15 }); }
function pxMatBasic(c) { return new THREE.MeshBasicMaterial({ color: c }); }

// ─── LED 幕墙 ─────────────────────────────────────────────────────────────────
let ledTexture = null;
let ledCtx = null;
const ledCanvas = document.createElement('canvas');
ledCanvas.width = 1920;
ledCanvas.height = 1080;
let lastLEDUpdate = 0;

function initLEDWall() {
  ledCtx = ledCanvas.getContext('2d');
  drawLEDInit();
  ledTexture = new THREE.CanvasTexture(ledCanvas);
  ledTexture.minFilter = THREE.LinearFilter;

  const wallW = 20, wallH = 10;

  // LED 屏幕面板
  const ledScreen = new THREE.Mesh(
    new THREE.PlaneGeometry(wallW, wallH),
    new THREE.MeshBasicMaterial({ map: ledTexture })
  );
  ledScreen.position.set(5, 5, -12);
  scene.add(ledScreen);

  // LED 边框
  const frameMat = pxMat(0x222222);
  const topFrame = new THREE.Mesh(new THREE.BoxGeometry(wallW + 0.4, 0.2, 0.3), frameMat);
  topFrame.position.set(5, wallH + 0.1, -12.15);
  scene.add(topFrame);
  const botFrame = new THREE.Mesh(new THREE.BoxGeometry(wallW + 0.4, 0.2, 0.3), frameMat);
  botFrame.position.set(5, -0.1, -12.15);
  scene.add(botFrame);
  const leftFrame = new THREE.Mesh(new THREE.BoxGeometry(0.2, wallH + 0.4, 0.3), frameMat);
  leftFrame.position.set(-5.1, wallH / 2, -12.15);
  scene.add(leftFrame);
  const rightFrame = new THREE.Mesh(new THREE.BoxGeometry(0.2, wallH + 0.4, 0.3), frameMat);
  rightFrame.position.set(15.1, wallH / 2, -12.15);
  scene.add(rightFrame);

  // 支架（2根）
  const poleMat = pxMat(0x1a1a1a);
  const pole1 = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.5, 0.3), poleMat);
  pole1.position.set(-5, -0.25, -12);
  scene.add(pole1);
  const pole2 = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.5, 0.3), poleMat);
  pole2.position.set(15, -0.25, -12);
  scene.add(pole2);
}

function drawLEDInit() {
  ledCtx.fillStyle = '#0a0a1a';
  ledCtx.fillRect(0, 0, 1920, 1080);
  // LED 像素点网格
  ledCtx.fillStyle = '#1a1a3a';
  for (let x = 0; x < 1920; x += 8) {
    for (let y = 0; y < 1080; y += 8) {
      ledCtx.fillRect(x, y, 6, 6);
    }
  }
  // 标题文字
  ledCtx.font = 'bold 48px sans-serif';
  ledCtx.fillStyle = '#00ddff';
  ledCtx.textAlign = 'center';
  ledCtx.fillText('0-1 项目看板', 960, 100);
  ledCtx.font = '24px sans-serif';
  ledCtx.fillStyle = '#668899';
  ledCtx.fillText('Loading...', 960, 150);
}

function updateLEDScreen() {
  fetch('/api/open?file=harness/robot/project-board.json')
    .then(r => r.json())
    .then(data => {
      drawDashboard(ledCtx, data);
      if (ledTexture) ledTexture.needsUpdate = true;
    })
    .catch(() => {
      // 网络错误时只更新时间戳
      ledCtx.fillStyle = '#0a0a1a';
      ledCtx.fillRect(0, 0, 1920, 1080);
      ledCtx.fillStyle = '#111128';
      for (let x = 0; x < 1920; x += 8) {
        for (let y = 0; y < 1080; y += 8) {
          ledCtx.fillRect(x, y, 6, 6);
        }
      }
      ledCtx.font = 'bold 48px monospace';
      ledCtx.fillStyle = '#00ddff';
      ledCtx.textAlign = 'center';
      ledCtx.fillText('0-1 项目看板', 960, 80);
      ledCtx.font = '28px monospace';
      ledCtx.fillStyle = '#ff4444';
      ledCtx.fillText('无法连接服务器', 960, 160);
      ledCtx.fillStyle = '#334455';
      ledCtx.font = '20px monospace';
      ledCtx.textAlign = 'right';
      ledCtx.fillText(new Date().toLocaleString(), 1800, 1060);
      if (ledTexture) ledTexture.needsUpdate = true;
    });
}

function drawDashboard(ctx, data) {
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, 1920, 1080);

  // LED 像素网格背景
  ctx.fillStyle = '#111128';
  for (let x = 0; x < 1920; x += 8) {
    for (let y = 0; y < 1080; y += 8) {
      ctx.fillRect(x, y, 6, 6);
    }
  }

  // 标题
  ctx.font = 'bold 48px monospace';
  ctx.fillStyle = '#00ddff';
  ctx.textAlign = 'center';
  ctx.fillText('0-1 项目看板', 960, 80);

  // 分隔线
  ctx.strokeStyle = '#334466';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(80, 110);
  ctx.lineTo(1840, 110);
  ctx.stroke();

  // 任务列表
  if (data && data.tasks) {
    let y = 160;
    data.tasks.forEach(task => {
      let color = '#666666';
      if (task.status === 'completed') color = '#44ff44';
      else if (task.status === 'in-progress') color = '#ffaa00';
      else if (task.status === 'not-started') color = '#ff4444';
      else if (task.status === 'planning') color = '#4488ff';

      ctx.fillStyle = color;
      ctx.font = 'bold 26px monospace';
      ctx.textAlign = 'left';
      const idStr = task.id || '';
      const titleStr = task.title || task.name || '';
      ctx.fillText(idStr + ' ' + titleStr, 80, y);

      ctx.fillStyle = '#778899';
      ctx.font = '20px monospace';
      ctx.textAlign = 'right';
      const statusStr = task.status || '';
      ctx.fillText(statusStr, 1840, y);

      // 进度条背景
      ctx.fillStyle = '#1a1a2a';
      ctx.fillRect(80, y + 6, 1680, 8);
      // 进度条
      let prog = 0;
      if (task.status === 'completed') prog = 1;
      else if (task.status === 'in-progress') prog = 0.5;
      else if (task.status === 'planning') prog = 0.2;
      ctx.fillStyle = color;
      ctx.fillRect(80, y + 6, 1680 * prog, 8);

      y += 60;
      if (y > 980) return;
    });
  }

  // 时间戳
  ctx.fillStyle = '#334455';
  ctx.font = '20px monospace';
  ctx.textAlign = 'right';

}

function makeTextCanvas(text, color) {
  const c = document.createElement('canvas'); c.width=320; c.height=60;
  const ctx = c.getContext('2d');
  ctx.font = 'bold 26px Courier New';
  ctx.fillStyle = color; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(text, 160, 30);
  return new THREE.CanvasTexture(c);
}

// ─── 大气层 ───────────────────────────────────────────────────────────────────
const atmosphereVS = `
varying vec3 vNormal;
void main() { vNormal = normalize(normalMatrix * normal); gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }
`;
const atmosphereFS = `
varying vec3 vNormal;
uniform vec3 glowColor;
void main() {
  float intensity = pow(0.65 - dot(vNormal, vec3(0.0,0.0,1.0)), 2.5);
  gl_FragColor = vec4(glowColor, intensity * 0.4);
}
`;
const atmosphereMat = new THREE.ShaderMaterial({
  vertexShader: atmosphereVS,
  fragmentShader: atmosphereFS,
  uniforms: { glowColor: { value: new THREE.Color(0x3399ff) } },
  transparent: true, side: THREE.BackSide, depthWrite: false
});
window._atmosphere = new THREE.Mesh(new THREE.SphereGeometry(80,32,32), atmosphereMat);
scene.add(window._atmosphere);

// ─── 点击交互 ─────────────────────────────────────────────────────────────────
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const clickables = [macbookGroup, ubuntuGroup];

renderer.domElement.addEventListener('click', (e) => {
  mouse.x = (e.clientX / innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(clickables, true);
  if (hits.length) {
    let obj = hits[0].object;
    while (obj.parent && !obj.userData.url) obj = obj.parent;
    if (obj.userData.url) window.open(obj.userData.url, '_blank');
  }
});

// ─── 动画循环 ─────────────────────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  const time = Date.now() * 0.001;

  updateCameraFlyIn();
  applySky(getCurrentSky());

  // LED 幕墙更新（每 10 秒）
  if (time - (window._lastLEDUpdate || 0) > 10) {
    window._lastLEDUpdate = time;
    updateLEDScreen();
  }

  // NPC idle 动画
  npcs.forEach(npc => {
    const body = npc.userData.body;
    const head = npc.userData.head;
    if (body) body.position.y = (npc.userData.baseBodyY || 0) + Math.sin(time * 2 + npc.id * 10) * 0.03;
    if (head) head.rotation.y = Math.sin(time * 1.5 + npc.id * 5) * 0.1;
  });

  // MacBook 状态指示器脉冲
  if (window._macPulse) {
    const s = 1 + Math.sin(time * 3) * 0.3;
    window._macPulse.scale.set(s, s, s);
    window._macPulse.material.opacity = 0.3 - Math.sin(time * 3) * 0.2;
  }

  controls.update();
  renderer.render(scene, camera);
}
animate();

// ─── 窗口 resize ──────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
