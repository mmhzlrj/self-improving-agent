; platformio.ini - ESP32-CAM RTSP Streaming Project Configuration
; Platform: PlatformIO for Arduino ESP32
; Board: AI-Thinker ESP32-CAM (or generic ESP32DEV)
; Framework: Arduino

[env:esp32cam]
; 上传目标板卡：AI-Thinker ESP32-CAM
platform = espressif32
board = esp32cam
framework = arduino

; ============================================================
; 上传/监控配置
; ============================================================
upload_speed = 921600
monitor_speed = 115200
; 串口监视器过滤器：隐藏 boot 启动信息，只显示用户日志
monitor_filters = esp32_exception_decoder, default

; ============================================================
; 库依赖
; ============================================================
lib_deps =
    ; ESP32-Camera 官方驱动
    ; https://github.com/espressif/esp32-camera
    esphome/esp32-camera@^2.0.4
    ; 或使用社区维护版（非官方，但功能更丰富）
    ; dogwatch/ESP32-Camera@^1.0.0

    ; RTSP 服务器实现（使用 airjournals ESP32-RTSP）
    ; 支持标准 RTSP 协议，可被 VLC / FFplay 直接拉流
    ; https://github.com/airicism/esp32-rtsp
    airjournals/ESP32-RTSP@^1.0.0

    ; WiFi 多连接支持（如需 AP+STA 双模）
    ; Wireguard/mDNS 等功能可选

; ============================================================
; 构建标志（Build Flags）
; ============================================================
build_flags =
    ; 启用 Arduino ESP32 核心的 Camera 驱动
    -DCORE_DEBUG_LEVEL=3

    ; 摄像头型号配置（根据实际硬件选择）
    ; 推荐：CAMERA_MODEL_AI_THINKER（AI-Thinker ESP32-CAM）
    ; 其他可选：
    ;   CAMERA_MODEL_WROVER_KIT
    ;   CAMERA_MODEL_ESP_EYE
    ;   CAMERA_MODEL_M5STACK_PSRAM
    ;   CAMERA_MODEL_M5STACK_WIDE
    ;   CAMERA_MODEL_CUSTOM
    -DCAMERA_MODEL_AI_THINKER

    ; WiFi 配置（通过环境变量或 override 覆盖）
    ; 默认热点名和密码占位符
    -DWIFI_SSID="ESP32_CAM_AP"
    -DWIFI_PASSWORD="12345678"

    ; RTSP 端口（默认 8554）
    -DRTSP_PORT=8554

    ; 视频分辨率配置
    ; 可选：FRAMESIZE_UXGA (1600x1200)
    ;       FRAMESIZE_SXGA (1280x1024)
    ;       FRAMESIZE_HD (1280x720)
    ;       FRAMESIZE_SVGA (800x600)  <-- 常用推荐
    ;       FRAMESIZE_VGA (640x480)
    -DVIDEO_FRAME_SIZE=SVGA

    ; JPEG 编码质量 (10-63, 越低质量越好)
    -DJPEG_QUALITY=12

    ; PSRAM 内存优化（ESP32-CAM 带 PSRAM 时开启）
    -DENABLE_PSRAM

    ; 禁用低功耗模式以提升稳定性
    -DCONFIG_FREERTOS_HZ=1000

; ============================================================
; 文件系统（可选：用于存储配置或 OTA）
; ============================================================
board_build.partitions = default.csv

; ============================================================
; 工程元数据
; ============================================================
; 以下为注释说明，不影响构建
; --------------------
; WiFi 连接说明：
;   默认以 AP 模式启动，IP: 192.168.4.1
;   可在代码中改为 STA 模式连接现有路由器
;
; RTSP 流地址：
;   rtsp://<设备IP>:8554/mjpeg/1
;   示例：rtsp://192.168.4.1:8554/mjpeg/1
;
; 兼容播放器：
;   VLC: rtsp://192.168.4.1:8554/mjpeg/1
;   FFplay: ffplay rtsp://192.168.4.1:8554/mjpeg/1
;   web: 通过 <img src="http://<设备IP>:80/stream" /> 直接嵌入
;
; 烧录方式：
;   1. 按住 BOOT 按钮不放
;   2. 点击 PlatformIO Upload
;   3. 看到 "Connecting.........." 时松开 BOOT
;   或使用 esptool 手动烧录：
;   python -m esptool --chip esp32 --port /dev/ttyUSB0 \
;       erase_flash
;   python -m esptool --chip esp32 --port /dev/ttyUSB0 \
;       write_flash 0x1000 bootloader.bin 0x8000 partitions.bin \
;       0x10000 <firmware.bin>
